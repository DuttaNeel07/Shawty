server {
  listen 80;

  root /usr/share/nginx/html;

  # 1. API Requests always go to backend
  location /api/ {
    proxy_pass http://backend:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # 2. Known Frontend Pages -> Served by React
  location ~ ^/(login|dashboard|verify)(/|$) {
    try_files $uri $uri/ /index.html;
  }

  # 3. Homepage root -> Served by React
  location = / {
    try_files /index.html =404;
  }

  # 4. Unknown routes (shortlinks) & Static Files
  # If the file exists (like .js or .css), serve it. 
  # If it doesn't exist, assume it's a short link and ask the backend!
  location / {
    try_files $uri @backend;
  }

  location @backend {
    proxy_pass http://backend:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }
}
