version: '3.8'

services:
  backend:
    build: ./server
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - LINEAR_API_KEY=${LINEAR_API_KEY}
      - CORS_ORIGIN=http://localhost:3000

  frontend:
    build: ./client
    ports:
      - "3000:80"
    depends_on:
      - backend
